<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>A Calculator</title>
</head>

<body>
    <style>
        body {

            display: flex;
            flex-direction: column;
            justify-content: flex-start     ;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            gap: 2px;
            padding-top: 50px;
            box-sizing: border-box;
            
            p {
                font-size: 20px;
            }
            h1 {
                font-size: 48px;
            }   
            h1, p {
                margin: 0;
            }

            .calculator-inputs {
                margin-top: 20px; /* Adjust this to create your gap */
              display: flex;    /* Makes the inputs inside sit nicely next to each other */
                 gap: 10px;
}
        }
    </style>
    <h1>Hello... World?</h1>
    <p>Anyway, look at this calculator!</p>

    <form>
        <div class="calculator-inputs">
            <input type="number" placeholder="First number">
            <input type="number" placeholder="Second number">

             <select>
                <option>+</option>
                <option>-</option>
                <option>*</option>
                <option>/</option>
            </select>

            <button type="submit">Calculate</button>
        </div>
</form>
<script src="calculator.js"></script>
</body>

</html>
